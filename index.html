<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DEBUG: Urban Probe</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        /* Force the browser to recognize the container size */
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw !important; height: 100vh !important; 
            background: #222; /* If this is black, the map isn't loading at all */
        }

        #map { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 1; 
            background: #333; /* If you see DARK GRAY, the DIV is working, but the MAP isn't */
        }

        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            width: 250px; padding: 20px;
            background: rgba(0,0,0,0.8); color: white;
            border-radius: 10px; border: 1px solid white;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui">
        <h3 style="margin-top:0; font-size: 12px;">SYSTEM DEBUG</h3>
        <div style="font-family: monospace; font-size: 12px;">
            LAT: <span id="lat">--</span><br>
            LNG: <span id="lng">--</span>
        </div>
        <button id="audio-start" style="width:100%; margin-top:10px;">START AUDIO</button>
    </div>

    <script>
        console.log("System Initializing...");

        let map, marker, synth;

        function startSystem() {
            try {
                // 1. Initialize Map
                map = L.map('map', { zoomControl: false }).setView([41.82, -71.41], 15);
                console.log("Map Object Created");

                // 2. Load standard tiles (No filters yet, let's just get a picture)
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                console.log("Tiles Requested");

                // 3. Add Marker
                marker = L.marker([41.82, -71.41], { draggable: true }).addTo(map);

                // 4. Update UI on Drag
                marker.on('drag', function(e) {
                    const pos = e.target.getLatLng();
                    document.getElementById('lat').innerText = pos.lat.toFixed(3);
                    document.getElementById('lng').innerText = pos.lng.toFixed(3);
                });

                // 5. Force Map to redraw (Fixes the black screen bug)
                setTimeout(() => { 
                    map.invalidateSize(); 
                    console.log("Map size invalidated/refreshed");
                }, 500);

            } catch (err) {
                console.error("Initialization Failed:", err);
            }
        }

        // Audio Logic
        document.getElementById('audio-start').onclick = async () => {
            await Tone.start();
            synth = new Tone.MonoSynth().toDestination();
            console.log("Audio Engine Ready");
        };

        // Fire system
        window.onload = startSystem;
    </script>
</body>
</html>
