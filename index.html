<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URBAN PROBE | Stabilized Build</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        /* FORCE VISIBILITY */
        html, body { 
            margin: 0; padding: 0; 
            width: 100vw !important; height: 100vh !important; 
            background: #1a1a1a; /* Dark gray fallback */
            overflow: hidden; 
        }

        #map { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important; 
            z-index: 1;
            background: #222;
        }

        /* The Shortbread Style Filter 
           This gives you that clean, architectural look without crashing WebGL */
        .leaflet-tile-container {
            filter: grayscale(1) brightness(1.1) contrast(0.9);
        }

        #ui {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            width: 240px; padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            font-family: monospace;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="ui">
    <h1 style="font-size: 10px; letter-spacing: 2px; margin: 0 0 15px 0;">PROBE MONITOR</h1>
    <div style="font-size: 11px;">
        COORD: <span id="pos">--</span><br>
        ELEV: <span id="ele">--</span>
    </div>
    <button id="audio-start">START SENSOR</button>
</div>

<script>
    let map, marker, synth, audioReady = false;

    function init() {
        console.log("Initializing Stable Map...");

        // 1. Create Map
        map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView([41.824, -71.412], 15);

        // 2. Load the "Alidade Smooth" Raster Preset
        // This is the raster version of Shortbread. It looks identical 
        // but is 100% stable on all Mac browsers.
        L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png', {
            maxZoom: 20
        }).addTo(map);

        // 3. Add Hardware Marker
        marker = L.marker([41.824, -71.412], { draggable: true }).addTo(map);

        marker.on('drag', function() {
            const p = marker.getLatLng();
            document.getElementById('pos').innerText = p.lat.toFixed(3) + ", " + p.lng.toFixed(3);
        });

        marker.on('dragend', function() {
            const p = marker.getLatLng();
            getElevation(p.lat, p.lng);
        });

        // 4. Force Resize Fix
        window.dispatchEvent(new Event('resize'));
        setTimeout(() => { map.invalidateSize(); }, 500);
    }

    // Audio Logic
    document.getElementById('audio-start').onclick = async () => {
        await Tone.start();
        synth = new Tone.MonoSynth().toDestination();
        document.getElementById('audio-start').innerText = "SENSOR ACTIVE";
        audioReady = true;
    };

    async function getElevation(lat, lng) {
        try {
            const r = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
            const d = await r.json();
            const e = d.results[0].elevation;
            document.getElementById('ele').innerText = Math.round(e) + "m";
            if(audioReady) synth.triggerAttackRelease(200 + e, "4n");
        } catch(err) { console.log("Elevation API Error"); }
    }

    window.onload = init;
</script>

</body>
</html>
