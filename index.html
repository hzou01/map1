<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URBAN PROBE | High Detail</title>
    
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #fff; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* UI Panel - Glass Look */
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            width: 240px; padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .stat { font-family: monospace; font-size: 13px; margin: 10px 0; display: flex; justify-content: space-between;}
        button { width: 100%; margin-top: 10px; padding: 12px; cursor: pointer; background: #000; color: #fff; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="ui">
    <h1 style="margin:0 0 10px 0; font-size: 10px; letter-spacing: 2px; opacity: 0.5;">URBAN PROBE v2.1</h1>
    <div class="stat"><span>Lat:</span><span id="lat">41.824</span></div>
    <div class="stat"><span>Lng:</span><span id="lng">-71.412</span></div>
    <div class="stat"><span>Ele:</span><span id="ele">-- m</span></div>
    <button id="audio-btn">ACTIVATE SOUND</button>
</div>

<script>
    // Initialize Map with a focus on Detail (Zoom 16+)
    const map = new maplibregl.Map({
        container: 'map',
        // Official 2026 Shortbread Mirror
        style: 'https://tiles.shortbread-tiles.org/styles/shortbread-light.json', 
        center: [-71.4128, 41.8245], 
        zoom: 16, // Higher zoom = more urban detail
        pitch: 0,
        antialias: true
    });

    // Custom Draggable Probe
    const marker = new maplibregl.Marker({ draggable: true, color: "#000" })
        .setLngLat([-71.4128, 41.8245])
        .addTo(map);

    // Audio Setup
    let synth, isStarted = false;
    document.getElementById('audio-btn').onclick = async () => {
        await Tone.start();
        synth = new Tone.MonoSynth({ oscillator: { type: "sine" } }).toDestination();
        document.getElementById('audio-btn').innerText = "SOUND ACTIVE";
        isStarted = true;
    };

    // Interaction Logic
    marker.on('dragend', () => {
        const ll = marker.getLngLat();
        document.getElementById('lat').innerText = ll.lat.toFixed(3);
        document.getElementById('lng').innerText = ll.lng.toFixed(3);
        
        // Data Probe: Fetch Topography
        fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${ll.lat},${ll.lng}`)
            .then(res => res.json())
            .then(data => {
                const ele = data.results[0].elevation;
                document.getElementById('ele').innerText = Math.round(ele) + "m";
                if(isStarted) synth.triggerAttackRelease(200 + (ele * 0.5), "4n");
            });
    });

    // Refresh detail on load
    map.on('load', () => {
        map.resize();
    });
</script>

</body>
</html>
