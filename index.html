<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URBAN PROBE | Clear Lens</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

    <div id="map"></div>
    <div id="probe-overlay"></div>

    <div id="ui">
        <h1>Urban Probe System</h1>
        <div class="control-group">
            <div class="slider-header">
                <span class="label">Probe Radius</span>
                <span id="radius-display"></span> 
            </div>
            <input type="range" id="radius-slider" min="400" max="20000" value="400">
        </div>
        <button id="start-btn">INITIALIZE SENSORS</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
