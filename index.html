<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URBAN PROBE | Shortbread Sim</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #fff; }
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; }

        /* THE SHORTBREAD SIMULATION FILTER */
        .leaflet-tile-container {
            filter: sepia(0.15) brightness(1.05) contrast(1.08) saturate(0.75) hue-rotate(-8deg);
        }

        /* Your Polished UI */
        #ui {
            position: absolute; top: 25px; left: 25px; z-index: 1000;
            width: 270px; padding: 25px;
            background: rgba(255, 255, 255, 0.72); 
            backdrop-filter: blur(15px) saturate(160%);
            -webkit-backdrop-filter: blur(15px) saturate(160%);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            color: #1a1a1a;
            font-family: -apple-system, sans-serif;
        }

        h1 { font-size: 10px; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; margin: 0 0 20px 0; }
        .stat { display: flex; justify-content: space-between; font-family: monospace; margin: 12px 0; font-size: 14px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
        button { width: 100%; padding: 14px; background: #000; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 15px;}
        
        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="ui">
    <h1>Urban Probe Sensor</h1>
    <div class="stat"><span>LAT:</span> <span id="lat">41.824</span></div>
    <div class="stat"><span>LNG:</span> <span id="lng">-71.412</span></div>
    <div class="stat"><span>ALT:</span> <span id="ele">-- m</span></div>
    <button id="start-btn">INITIALIZE PROBE</button>
</div>

<script>
    let map, marker, synth, audioActive = false;

    function init() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([41.8245, -71.4128], 16);

       L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        marker = L.marker([41.8245, -71.4128], { draggable: true }).addTo(map);

        marker.on('drag', (e) => {
            const p = e.target.getLatLng();
            document.getElementById('lat').innerText = p.lat.toFixed(3);
            document.getElementById('lng').innerText = p.lng.toFixed(3);
        });

        marker.on('dragend', (e) => {
            const p = e.target.getLatLng();
            fetchData(p.lat, p.lng);
        });

        document.getElementById('start-btn').onclick = async () => {
            await Tone.start();
            synth = new Tone.MonoSynth().toDestination();
            document.getElementById('start-btn').innerText = "ONLINE";
            audioActive = true;
        };
    }

    async function fetchData(lat, lng) {
        try {
            const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
            const data = await res.json();
            const val = data.results[0].elevation;
            document.getElementById('ele').innerText = Math.round(val) + "m";
            if (audioActive && synth) synth.triggerAttackRelease(200 + val, "4n");
        } catch(e) { console.log("Data probe..."); }
    }

    window.onload = init;
</script>
</body>
</html>
