<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URBAN PROBE | Final Build</title>
    
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #222; overflow: hidden; }
        
        /* The Map Container - if the map fails, you will see a dark gray background */
        #map { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #333; 
            z-index: 1;
        }

        /* UI Panel */
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            width: 240px; padding: 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            font-family: monospace;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button { width: 100%; margin-top: 10px; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="ui">
    <h2 style="margin:0 0 10px 0; font-size: 14px;">PROBE v1.0</h2>
    <div id="status">INIT...</div>
    <div id="coords" style="margin-top:10px; font-size: 11px;">--</div>
    <button id="audio-btn">START AUDIO</button>
</div>

<script>
    // 1. Initialize Map with Error Catching
    try {
        const map = new maplibregl.Map({
            container: 'map',
            // Using a different Shortbread Stylesheet mirror
            style: 'https://demotiles.maplibre.org/style.json', 
            center: [-71.412, 41.824],
            zoom: 13
        });

        const marker = new maplibregl.Marker({ draggable: true, color: 'red' })
            .setLngLat([-71.412, 41.824])
            .addTo(map);

        map.on('load', () => {
            document.getElementById('status').innerText = "MAP ACTIVE";
            // Once loaded, we "inject" the Shortbread layers if possible
            map.setStyle('https://tiles.shortbread-tiles.org/styles/shortbread-light.json');
        });

        marker.on('dragend', () => {
            const ll = marker.getLngLat();
            document.getElementById('coords').innerText = `LAT: ${ll.lat.toFixed(4)}\nLNG: ${ll.lng.toFixed(4)}`;
            playTone(ll.lat);
        });

    } catch (e) {
        document.getElementById('status').innerText = "LOAD ERROR";
        console.error(e);
    }

    // 2. Simple Tone Logic
    let synth;
    document.getElementById('audio-btn').onclick = async () => {
        await Tone.start();
        synth = new Tone.Synth().toDestination();
        document.getElementById('audio-btn').innerText = "AUDIO READY";
    };

    function playTone(val) {
        if(synth) synth.triggerAttackRelease(200 + (val * 2), "8n");
    }
</script>

</body>
</html>
