<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URBAN PROBE | Industrial Sensor</title>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.19/leaflet-maplibre-gl.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: sans-serif; }
        
        /* THE MAP - Forces Monotone Roads */
        #map { 
            position: absolute; width: 100vw; height: 100vh; z-index: 1; 
            background: #0a0a0a;
        }

        /* This filter isolates green/blue and kills road colors */
        .leaflet-tile-container {
            filter: brightness(0.5) contrast(1.2) saturate(0.1) grayscale(0.5);
        }

        /* UI OVERLAY */
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            width: 260px; padding: 25px;
            background: rgba(20, 20, 20, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
        }

        h1 { font-size: 10px; letter-spacing: 3px; opacity: 0.5; margin: 0 0 15px 0; text-transform: uppercase; }
        .stat { display: flex; justify-content: space-between; font-family: monospace; margin: 10px 0; font-size: 13px; }
        .label { font-size: 9px; opacity: 0.4; text-transform: uppercase; font-family: sans-serif; }
        
        button { 
            width: 100%; padding: 12px; background: white; border: none; 
            font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 15px;
        }
        input[type=range] { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui">
        <h1>Urban Probe Sensor</h1>
        <div class="stat"><span class="label">Pos:</span> <span id="coords">DRAG PIN</span></div>
        <div class="stat"><span class="label">Elev:</span> <span id="ele">--</span></div>
        <input type="range" id="radius" min="100" max="2000" value="500">
        <button id="start-btn">INITIALIZE AUDIO</button>
    </div>

    <script>
        let map, marker, circle, synth;
        let active = false;

        function init() {
            // Setup Map
            map = L.map('map', { zoomControl: false }).setView([41.8245, -71.4128], 15);
            
            // Voyager tiles show water/parks clearly for the filter to work
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

            marker = L.marker([41.8245, -71.4128], { draggable: true }).addTo(map);

            circle = L.circle([41.8245, -71.4128], { 
                radius: 500, color: 'white', weight: 1, fillOpacity: 0.05 
            }).addTo(map);

            // Update UI on drag
            marker.on('drag', (e) => {
                const p = e.target.getLatLng();
                circle.setLatLng(p);
                document.getElementById('coords').innerText = p.lat.toFixed(3) + ", " + p.lng.toFixed(3);
            });

            // Audio Activation
            document.getElementById('start-btn').onclick = async () => {
                await Tone.start();
                synth = new Tone.MonoSynth({
                    oscillator: { type: "sine" },
                    envelope: { attack: 0.1, release: 1 }
                }).toDestination();
                document.getElementById('start-btn').innerText = "SENSORS ACTIVE";
                active = true;
            };

            // Elevation Probe on drop
            marker.on('dragend', async (e) => {
                const p = e.target.getLatLng();
                try {
                    const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${p.lat},${p.lng}`);
                    const data = await res.json();
                    const val = data.results[0].elevation;
                    document.getElementById('ele').innerText = Math.round(val) + "m";
                    if (active && synth) synth.triggerAttackRelease(200 + val, "4n");
                } catch(err) { console.log("API Error"); }
            });

            // Slider Sync
            document.getElementById('radius').oninput = (e) => {
                circle.setRadius(e.target.value);
            };
        }

        window.onload = init;
    </script>
</body>
</html>
